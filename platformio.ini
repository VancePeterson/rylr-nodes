[platformio]
extra_configs = secrets.ini

[common]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_flags =
    -D LORA_BAND=915000000
    -D LORA_CHANNEL=6
    -D LORA_GATEWAY_ADDRESS=1
    -D LORA_BAUD=115200
    -D LORA_CPIN=\"${secrets.lora_cpin}\"

; Test node - heartbeat sender used for bench / range testing
[env:testnode]
extends = common
build_src_filter = +<testnode.cpp>
build_flags =
    ${common.build_flags}
    -D LORA_ADDRESS=2
    -D NODE_NAME='"testnode"'
    -D HEARTBEAT_INTERVAL_S=5

; Skeleton: battery node, deep sleep, report-only. Fill in readState().
[env:deep_sleep_simplex]
extends = common
build_src_filter = +<deep_sleep_simplex.cpp>
build_flags =
    ${common.build_flags}
    -D LORA_ADDRESS=3
    -D NODE_NAME='"deep_sleep_simplex"'
    -D WAKE_INTERVAL_S=300

; Skeleton: battery node, deep sleep, report + command. Fill in applyCommand().
[env:deep_sleep_duplex]
extends = common
build_src_filter = +<deep_sleep_duplex.cpp>
build_flags =
    ${common.build_flags}
    -D LORA_ADDRESS=4
    -D NODE_NAME='"deep_sleep_duplex"'
    -D WAKE_INTERVAL_S=600
    -D LISTEN_WINDOW_MS=15000

; Skeleton: mains-powered node, always on, report-only.
[env:powered_simplex]
extends = common
build_src_filter = +<powered_simplex.cpp>
build_flags =
    ${common.build_flags}
    -D LORA_ADDRESS=5
    -D NODE_NAME='"powered_simplex"'
    -D STATE_INTERVAL_S=60

; Skeleton: mains-powered node, always on, report + command.
[env:powered_duplex]
extends = common
build_src_filter = +<powered_duplex.cpp>
build_flags =
    ${common.build_flags}
    -D LORA_ADDRESS=6
    -D NODE_NAME='"powered_duplex"'
    -D HEARTBEAT_INTERVAL_S=60
